                groceryList: []
            };

            let isBP = patient.conditions.includes("High Blood Pressure (Hypertension)");
            let isDigestive = patient.conditions.includes("Digestive Problems");
            let isElderly = parseInt(patient.age) > 65;
            let isVeg = patient.dietType === "Vegetarian";

            // Rules -> DOs & DONTs
            if (isDiabetic) {
                plan.dos.push("Use low Glycemic Index (GI) foods like oats, barley, and whole pulses.");
                plan.dos.push("Include a small portion of protein with every meal to stabilize blood sugar.");
                plan.donts.push("Avoid refined sugars, sweet fruits (mango, banana), and fruit juices.");
                plan.donts.push("Avoid starchy carbs like potatoes and white rice.");
                plan.emergencySnacks = ["Handful of roasted chana", "Half an apple with 2 almonds", "Buttermilk"];
            }
            if (isBP) {
                plan.dos.push("Use less than 1 tsp of salt per day (low sodium).");
                plan.dos.push("Increase potassium-rich vegetables like spinach and bottle gourd.");
                plan.donts.push("Strictly avoid papad, pickles, commercial sauces, and canned foods.");
            }
            if (isElderly) {
                plan.dos.push("Ensure foods are well-cooked and easily chewable.");
                plan.dos.push("Drink warm water and stay hydrated frequently.");
                plan.donts.push("Avoid excessively dry or hard-to-chew foods (raw salads/whole nuts).");
            }
            if (isDigestive || patient.conditions.includes("Acidity")) {
                plan.dos.push("Eat meals at regular intervals. Keep dinner light.");
                plan.donts.push("Avoid very spicy, deep-fried foods, and excessive tea/coffee.");
            }

            // Defaults if no specific rules trigger
            if (plan.dos.length === 0) plan.dos.push("Eat a balanced set of macros.", "Drink 2-3L of water.");
            if (plan.donts.length === 0) plan.donts.push("Avoid ultra-processed junk food.");
            if (plan.emergencySnacks.length === 0) plan.emergencySnacks = ["Boiled egg (if non-veg)", "Mixed nuts", "Fruit bowl"];

                }
            }, []);

            const handleLogin = (user) => {
                sessionStorage.setItem('activePatient', user.id);
                setCurrentUser(user);
                setView('dashboard');
            };

            const handleLogout = () => {
                sessionStorage.removeItem('activePatient');
                setCurrentUser(null);
                setView('landing');
            };

            return (
                <div className="min-h-screen flex flex-col relative w-full overflow-hidden">
                    <div className="absolute inset-0 bg-medical-pattern opacity-30 pointer-events-none" />
                    
                    <Topbar currentView={view} onNavigate={setView} onLogout={handleLogout} />
                    
                    <main className="flex-1 relative z-10 w-full overflow-y-auto pb-20 sm:pb-0">
                        {view === 'landing' && <LandingPage navTo={setView} />}
                        {view === 'login' && <PatientLogin navTo={setView} onLogin={handleLogin} />}
                        {view === 'register' && <RegistrationFlow navTo={setView} onLogin={handleLogin} />}
                        {view === 'dashboard' && currentUser && <PatientDashboard user={currentUser} navTo={setView} />}
                        {view === 'diet-plan' && currentUser && <DietPlanView user={currentUser} navTo={setView} />}
                        {view === 'food-library' && currentUser && <FoodLibraryView user={currentUser} navTo={setView} />}
                        {view === 'nutrition-analyzer' && currentUser && <NutritionAnalyzerView user={currentUser} navTo={setView} />}
                    </main>
                    {/* Multi-view support mobile nav could go here */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
